<!DOCTYPE html>
<html>
<head>
    <title>Login - Punto Encuentro</title>
</head>
<body>
    <h1 align="center">Iniciar Sesión</h1>
    <div style="text-align:center;">
        <form id="loginFrm">
            <label>Email
                <input id="email" type="email" placeholder="Ingresa tu correo" required>
            </label>
            <br><br>
            <label>Password
                <input id="password" type="password" placeholder="Ingresa tu password" required>
            </label>
            <br><br>
            <button type="button" onclick="loginUsuario()">Entrar</button>
        </form>
        <div id="mensaje" style="margin-top:20px"></div>
    </div>

<script src="js/script2.js"></script>
</body>
</html>
